#  Autopublish configuration for shacl12-node-expr
name: CI (shacl12-node-expr)
on:
  push:
    branches: [gh-pages]
    paths: ["shacl12-node-expr/**"]

jobs:
  main:
    name: Build, Validate and Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: w3c/spec-prod@v2
        with:
          TOOLCHAIN: respec
          SOURCE: shacl12-node-expr/index.html
          W3C_ECHIDNA_TOKEN: ${{ secrets.SHACL_NODE }}
          W3C_WG_DECISION_URL: "https://www.w3.org/2025/08/25-data-shapes-minutes.html#46be"
          W3C_BUILD_OVERRIDE: |
            specStatus: WD
            shortName: shacl12-node-expr
