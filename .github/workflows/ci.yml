name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.25']
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Run tests
        run: go test ./... -count=1

      - name: Run tests with race detector
        run: go test -race ./... -count=1

      - name: Run W3C conformance tests
        run: |
          echo "=== Turtle ===" && go test ./turtle/ -run TestW3C -v -count=1 2>&1 | tail -1
          echo "=== N-Triples ===" && go test ./nt/ -run TestW3C -v -count=1 2>&1 | tail -1
          echo "=== N-Quads ===" && go test ./nq/ -run TestW3C -v -count=1 2>&1 | tail -1
          echo "=== RDF/XML ===" && go test ./rdfxml/ -run TestW3C -v -count=1 2>&1 | tail -1
          echo "=== SHACL ===" && go test ./shacl/ -run TestW3C -v -count=1 2>&1 | tail -1

      - name: Check build
        run: go build ./...

      - name: Run vet
        run: go vet ./...
